<!DOCTYPE html>
<html lang="en">
<head>
  <title>Text Formatting</title>  <!--HTML contains several elements for defining text with a special meaning.-->
</head>
<body>
  <!--<b> elements: Defines bold text-->
    <b>This text is bold</b>

  <!--<strong> elements: Defines text with strong importance.-->
    <strong>This text is important!</strong>

  <!--<i> elements: Defines a part of text in an alternate voice or mood.-->
    <i>This text is italic</i>

  <!--<em> elements: Defines emphasized text.-->
    <em>This text is emphasized</em>

  <!--<small> elements: Defines smaller text:-->
    <small>This text is small</small>

  <!--<mark> element: DefineS marked or highlighted text:-->
    <p>Do not forget to buy <mark>milk</mark> today.</p>

  <!--<del> element: Defines deleted TEXT.:-->
    <p>My favorite color is <del>blue</del> red.</p>

  <!--<ins> element: Defines inserted text:-->
    <p>My favorite color is <del>blue</del> <ins>red</ins>.</p>

  <!--<sub> element: Defines subscript text.-->
    <p>This is <sub>subscripted</sub> text.</p>

  <!--<sup> element: Defines superscript text.-->
    <p>This is <sup>superscripted</sup> text.</p>
</body>
</html>
